front:
  text: 洞玄靈寳眞人修行延年益筭法吹六
  hash: sha256:e3d5ccc93d1c93b7d9c6b57bd08f09d766021d2d0984c7e71724f94ec4f743a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0080_SJB_000-320579b, image: sjb/32/320579b.png}
body:
  text: 六甲神姓名甲子神名王文卿甲戍神名展子江甲申神名扈文長甲午神名衞上卿甲辰神名孟非卿甲寅神名明文章凡修行之士常存六甲神姓名則七竅開通無諸疾病不逢殃禍遇賊呼其日神助之四海神名東海神名阿明西海神名巨乗南海神名祝融北海神名玄冥凡修行之士毎朝雞鳴時常依此法誦持三遍巳上四海大神辟邪魔群除蕩凶殃急急如律令毎日雞鳴時先呼上一赤子守上丹田中一眞人子守中丹田下一嬰兒元陽谷守下丹田修行之士毎日雞鳴時及夜初卧時常依此法存呼之能辟邪魔消災去病正當口念三一名字之時心即存其形狀如嬰孩毎一嬰孩存長三寸始生之形並著赤衣甲子日勿存念三一之神此爲重禁老子理身守一法常以雞鳴時摩拭兩目先誦呪曰西王毋女名曰益愈賜我目藥受之於口即精摩形常在雞鳴二七靈液除目昏蒙瞻視萬里徧見四方誦呪畢即拱手三嘘之兼微出津掌中即以手摩令熱摩目二七令人目明通仙毎日雞鳴時常閉目𥨸呪曰黄裳子黄裳子黄庭眞人常在己爲我取醴酒肥脯粳粮黍臛神丹玉芝諸可食者皆至入吾口中充滿五臟補養百神令我不飢不渴與天地齊畢與日月同光保守千萬年凡修行之士毎日雞鳴時先宻誦三遍訖次即咽氣五過止毎咽先漱靈液即微鼓頰存黄氣滿口即咽之自然飽矣兼内除百病益壽延年毎日清旦叩齒三通呼三魂名呪曰胎光延生爽靈益禄幽精除死急急如律令凡修行之士毎日如此三魂不離人左右非災横禍惡鬼凶神不能爲害遊夢變怪杜絶房寢仙經曰夫學道之士朝来常言善事天與之福朝来不得言柰何字又不得歌管此名爲請禍切誡之凡牀上卧莫歌莫詠勿覆卧此三忌並大凶皆損壽夫學道者第一欲得廣行隂德慈向萬物救拔艱危度人苦厄輕財重道施惠布德守一之道有厄難念一畢向師所在再拜求救立便得解大急但念心拜耳守一之道忍辱爲本欲殺人念飛仙欲妬忌念大神欲貪財念眞人守一之道或不能至常一心念若卒爲惡思所驚恐厭魅當起視北斗輔星輔星者七星第六是也并念一則百邪却去身無殃也若遇天隂雨不見星但精心念一矣老子曰凡欲修道心無二端天能守一覆如不舉地能守一靜如能安嶽能守一不避暑寒海能守一流如不還人能守一必得神仙西王毋曰理髪常向本命旣櫛髪之始而微呪曰大帝散靈五老反神泥丸玄華保精長存左拘隱月右引日根六合清鍊百神受恩祝畢咽液三過常行之使頭腦不痛坐卧常欲鼻孔向本命食飲及服藥亦然若不得向本命者得常向東北及西北亦佳此二處是天地魂魄之關津也又卧起常自左右揺動身體數十過畢又兩手據後而仰頭向天左右自揺動項二十過畢平坐舉兩手良久畢又摩拭目旁至兩耳又良久隂呪曰前摶後拍天地上客左盻右顧長生大度仰頭喘息太一相極却月龍偃司命同軫飲食胎元交關崐崘徊倒雙跪眞人同志祝畢輙引氣閉之存臍中赤氣大如線出臍外入鼻中如此三過按摩之道都畢使人百關通利長生壽命無窮而不病登眞曰欲得延年當洗面精心日出二丈正面向口吐死氣鼻噏日精須鼻得嚏便止是爲氣通亦以補精復胎生之方也登眞曰欲使心正常當以日出三丈錯手著兩肩上當出心對日以日正當心心中聞暖存日精暉来入心故覺其微暖則心正矣常能行之佳老子理身守一法夫欲食之時先𥨸呪曰某甲建身爲道身爲天府道父道毋眞人神人仙人道人聖人合而爲道俱共飲食長生無極凡欲飲水先三嘘畢呪曰乾元亨利貞身爲日國王神水入腹五藏清凉毎欲飲水皆先呪而後飲王君曰勿臨食時及合和一切藥物燒鍊藥不得說死亡及不祥事切忌夫服藥常向本命上服畢勿言死亡事犯傷胎神徒勞服藥物終無益也老子理身守一法毎喫一切飯食及服一切藥皆先誦此呪曰黄裳子三呼之爲我取肥脯美酒粳粮黍臛神丹玉芝置此食器中及藥器中上一中一下一三一之神各就食器中及藥器中而食更相哺飼及飼我身兼存三嬰孩毎一嬰孩各存長三寸各著赤衣在食器中而食如對雜人同飡即不用誦呪但存三嬰孩次第同向飯食中徧喫了巳然後喫晝夜常能如此存念三一令人増福益壽兼辟邪去病又呪曰百藥入胃與神合氣塡補血液屍邪亡墜長生神仙飛登金闕役使六丁靈童奉衞眞誥曰養生之道先欲識己之形存之極令准的在目前矣使面上恒有日月之光周照一形存日在左月在右去面前九寸許乃叩齒三通微祝曰元胎上眞𩀱景二玄左抱七魄右拘三魂令我神明與形長存呪畢又叩齒三通咽液三過止此名爲太帝君録形拘魂制魄之道如此行之不倦使人魂魄不敢離形神仙長生之道要太素丹景經曰一面之上常欲兩手摩拭之髙下隨形摩拭唯令數無時節也如此常行則通利耳目恒以手按兩眉後小空中三九過又以手心及指摩兩目下顴上摩唯多爲佳以手旋耳行三十過畢輙以手逆乗額三九過從眉中始及上行入髪際中傍咽液多少無數也如此常行目自清明一年可夜書眞誥曰凡體有痛處常以生氣時咽液二七過按所痛處向王方而呪曰左玄右玄三神合眞左黄右黄六華相當風氣惡疾伏匿四方玉液流澤上下宣通内遣水火外辟不祥長生飛仙身常体强又當急按所痛處三十一過常能如此則無病彭君口訣毎日平旦卧未起時及夜初卧時存之眞人子丹在兩眉間戴青幘冠子常能思之壽八百歳王君曰夜行及冥卧若心中恐怖者存日月還入明堂中須㬰百邪自滅山居恒爾爲佳師曰夜行念太隂君太隂君就我来就我来此呪無所不辟夜行先祝曰一君在吾前二君在吾後衆邪惡物皆不得近吾欲求長生之法當以月晦日人定時北首卧以手固心上祝曰五藏之君道德七神天父地毋日君月臣諸天皆下守衞眞人千神百靈保護我身唯乞長生攺故易新公兆七庶兆二男曰公兆女曰庶兆青牛道士口訣毎暮卧存日在額上月在臍下辟千鬼萬邪致天府玉女祕驗祕驗暮卧祝曰廓廓恢恢禍去福来恢恢廓廓除凶除惡太上賜壽司命政之名上玉曆編以青絲諸神備具百災皆除夜初欲卧上床訖便轉履向外呪曰廻履背床除邪辟兵天帝獄吏禁鬼夜行重者斬腰輕者棄市不輕不重截鬼兩耳急急如太上老君律令便叩齒三通毎夜卧叩齒三七左手撫心呼三尸名上尸彭居出中尸彭質出下尸彭矯出輙不得爲害夜初卧時正偃卧即以兩手撫心呪曰神人神人五藏光生存我骨髓養育華精神光巳固却老延年天符天符保護我軀精神所在神光所行所欲者得所惡者伏急急如太上老君律令次即誦天靈節榮願得長生太一眞玄守臣身形五臟君侯各自安寧男祝一七遍女祝二七遍眞人常以夜半時去枕平卧握固放體氣調而微者身神具矣如有不具便速起燒香坐閉目握固兩膝上心存體神使兩目中有白氣如雞子大在目前則復故也五日一行之此即二十四神中事也凡著新衣舉頭向日呪曰赫赫洋洋身有神光著此衣裳富貴吉昌壽命延長夜卧覺更急閉兩目即叩齒九通咽液九過以手按鼻邊左右上下數十過微祝曰太上四明九門發精耳目玄徹通眞達靈天中之臺流氣調乎嬌女雲儀眼童英明華聰炅朗百度眇清保和上元徘徊九城五藏植根耳目自生天臺鬱素梁柱不傾七魄澡練三魂安寧赤子擕景輙與我并有敢掩我耳目太上當摧以流鈴萬凶消滅所願必成日月守門心藏五星眞皇所祝群響敬聽畢又咽液九過然後摩拭面目令小熱以爲常但卧覺即按祝勿令失一卧也常爲之令人耳目聰明强識豁朗鼻中調平不唾津涕面有童顔制魂録魄却辟萬魔太素眞人敎始學者辟諸惡夢若數遇惡夢者一日魄祅二日心試三日尸賊厭消之法若夢覺便即起坐北向以左手捻人中二七過第二第三指捻山源近鼻下本際穴中隂數二七過勿舉手啄齒二七微祝曰太洞眞玄張鍊三魂第一魂速守魄第二魂速守泥丸第三魂受心節度速啓太上三元君向遇不祥之夢是七魄遊尸来挾萬邪之源急召桃康護命上告帝君五老九眞皆守生門黄闕神帥紫戸將軍把鉞握鈴消滅惡津反凶成吉生死無因若夜遇善夢吉應而心中自以爲佳則吉感也卧覺當摩目二七叩齒二七而微呪曰太上髙精三帝丹靈絳宫明徹吉感告情三元守魄天皇受經所向諧合飛仙上清常與玉眞俱㑹紫庭此大洞祕訣以傳於始渉津流者矣夜遇惡夢覺即反枕或更枕而祝曰太冥玉女侍眞衞魂六宫金童来守生門化惡爲善上書三元使我長生乗景駕雲祝畢咽液七過叩齒七通而更卧如此四五亦自都絶消息也此祝亦反惡夢更爲吉祥矣眞人曰詣廁法初登廁先呪曰左德君右德君上司命清夫人除去某乙死籍入生門上廁用草法先置一枚著左爲左徳君次置一枚著右爲右德君又置一枚著中央除去某死籍入生門廁草長短不得過九寸如過此數即減人壽命切須忌之若在草野中大便即呪曰林野夫人林野夫人除去某死籍入生門如用廁草呪與前厠上法同洞玄靈寳眞人修行延年益筭法
